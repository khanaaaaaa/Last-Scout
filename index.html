<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Last Scout - AOT Game</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="background-image"></div>

  <div id="main-container">
    <h1 id="game-title">LAST SCOUT</h1>
    <p id="subtitle">Attack on Titan Fan Game</p>

    <div id="location-text"></div>

    <div id="character-box">
      <div id="character-img"></div>
      <p id="character-name-text"></p>
    </div>

    <div id="dialogue-area" style="display:none;">
      <p id="speaker-name"></p>
      <p id="dialogue-text"></p>
    </div>

    <div id="story-box">
      <p id="story-text"></p>
    </div>

    <div id="buttons-area"></div>

    <p id="click-to-continue"></p>
  </div>

  <script src="js/scenes/scene1.js"></script>
  <script src="js/scenes/scene2A.js"></script>
  <script src="js/scenes/scene2B.js"></script>
  <script src="js/scenes/scene2C.js"></script>
  <script src="js/scenes/scene3.js"></script>
  <script src="js/scenes/scene3B.js"></script>
  <script src="js/scenes/scene4A.js"></script>
  <script src="js/scenes/scene4B.js"></script>
  <script src="js/scenes/scene4C.js"></script>
  <script src="js/scenes/scene5.js"></script>
  <script src="js/scenes/index.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
