<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LAST SCOUT</title>
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/crt.css">
</head>
<body>

  <div id="crt"></div>
  <div id="phosphor"></div>
  <div id="flicker"></div>
  <div id="scan-line"></div>
  <div id="bg-layer"></div>
  <div id="bg-layer-next"></div>
  <div id="particles"></div>
  <div id="vignette"></div>

  <div id="char-layer">
    <div id="char-portrait"></div>
    <div id="char-name"></div>
  </div>

  <div id="hud">
    <span id="lore-tag"></span>
    <span id="rank"></span>
  </div>

  <div id="title-block">
    <div id="title-sub">ATTACK ON TITAN</div>
    <h1 id="title">LAST SCOUT</h1>
  </div>

  <div id="narration-box" class="hidden">
    <p id="scene-text"></p>
  </div>

  <div id="game">
    <nav id="choices"></nav>

    <div id="panel">
      <div id="dialogue-box">
        <div id="dialogue-speaker-tab" class="hidden"></div>
        <p id="dialogue-line"></p>
      </div>
      <div id="skip-hint">PRESS TO CONTINUE</div>
    </div>

    <div id="footer">
      <span id="footer-left">SURVEY CORPS // FIELD UNIT</span>
      <span id="footer-right">YEAR 850</span>
    </div>
  </div>

  <script src="js/scenes/scene1.js"></script>
  <script src="js/scenes/scene2A.js"></script>
  <script src="js/scenes/scene2B.js"></script>
  <script src="js/scenes/scene2C.js"></script>
  <script src="js/scenes/scene3.js"></script>
  <script src="js/scenes/scene3B.js"></script>
  <script src="js/scenes/scene4A.js"></script>
  <script src="js/scenes/scene4B.js"></script>
  <script src="js/scenes/scene4C.js"></script>
  <script src="js/scenes/scene5.js"></script>
  <script src="js/scenes/index.js"></script>
  <script src="js/bg.js"></script>
  <script src="js/particles.js"></script>
  <script src="js/sound.js"></script>
  <script src="js/transitions.js"></script>
  <script src="js/typewriter.js"></script>
  <script src="js/hud.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/engine.js"></script>
</body>
</html>
